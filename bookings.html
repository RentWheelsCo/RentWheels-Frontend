<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Bookings – RentWheels</title>
  <link rel="stylesheet" href="bookings.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ======== PAGE WRAPPER ======== -->
  <main class="bookings-page">
    <div class="container">

      <!-- Page Header -->
      <div class="page-header">
        <h1 class="page-title">My Bookings</h1>
        <p class="page-subtitle">View and manage your vehicle bookings</p>
      </div>

      <!-- Bookings List -->
      <div class="bookings-list" id="bookingsList">
        <!-- Cards injected by JS -->
      </div>

      <!-- Empty State (hidden by default) -->
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-state__icon">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="16" width="48" height="36" rx="4" stroke="#CBD5E1" stroke-width="2.5"/>
            <path d="M8 24h48" stroke="#CBD5E1" stroke-width="2.5"/>
            <path d="M20 36h24M20 42h16" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="empty-state__title">No bookings yet</h3>
        <p class="empty-state__text">You haven't made any vehicle bookings. Start exploring our fleet!</p>
        <a href="index.html" class="btn-primary">Browse Vehicles</a>
      </div>

    </div>
  </main>

  <script src="bookings.js"></script>
</body>
</html>
