<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RentWheels – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/login.css" />
</head>

<body>

  <div class="page-body">
    <div class="card">

      <div class="card-image">
        <img src="../assets/car_login.png" alt="Futuristic car on map"
          onerror="this.style.display='none'; this.parentElement.classList.add('fallback')" />
      </div>

      <div class="card-form">
        <div class="avatar-icon">
          <img src="../assets/profile.png" alt="Profile" />
        </div>
        <h2>Welcome</h2>

        <form id="loginForm" novalidate>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" />
            <span class="field-msg error" id="email-err">Please enter a valid email address.</span>
            <span class="field-msg success" id="email-ok"></span>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="pw-wrap">
              <input type="password" id="password" name="password" placeholder="Enter your password"
                autocomplete="current-password" />
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Show/hide password">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <span class="field-msg error" id="pw-err">Password must be at least 6 characters.</span>
            <span class="field-msg success" id="pw-ok"></span>
          </div>

          <a href="forgot-password.html" class="forgot">Forgot password?</a>

          <div id="loginError">
            Invalid email or password. Please try again.
          </div>

          <button type="submit" class="btn-submit">Login</button>

          <button type="button" class="btn-google">
            <svg viewBox="0 0 48 48">
              <path fill="#EA4335"
                d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.9 2.5 30.3 0 24 0 14.8 0 6.9 5.4 3 13.3l7.8 6C12.6 13 17.9 9.5 24 9.5z" />
              <path fill="#4285F4"
                d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.8-2.2 5.2-4.7 6.8l7.3 5.7c4.3-4 6.8-9.9 7.2-16.5z" />
              <path fill="#FBBC05"
                d="M10.8 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7L2.5 13.3A24 24 0 0 0 0 24c0 3.8.9 7.4 2.5 10.7l8.3-6z" />
              <path fill="#34A853"
                d="M24 48c6.5 0 12-2.1 16-5.8l-7.3-5.7c-2.1 1.4-4.8 2.2-8.7 2.2-6.1 0-11.4-4.1-13.2-9.7l-8.3 6A24 24 0 0 0 24 48z" />
            </svg>
            Sign in with Google
          </button>

          <p class="signup-link">Create an account? <a href="signup.html">click here</a></p>

        </form>
      </div>

    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>

</html>
