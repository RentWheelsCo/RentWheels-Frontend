<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled - RentWheels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/payment-status.css" />
</head>
<body>
  <main class="payment-shell">
    <section class="payment-card">
      <div class="payment-icon payment-icon--cancel" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="payment-title">Payment Cancelled</h1>
      <p class="payment-text">No payment was captured. You can return to the vehicle page and try checkout again.</p>
      <div class="payment-actions">
        <a class="btn btn-primary" href="../html/vehicle.html">Try Again</a>
        <a class="btn btn-ghost" href="../html/home.html">Back to Home</a>
      </div>
    </section>
  </main>
</body>
</html>
