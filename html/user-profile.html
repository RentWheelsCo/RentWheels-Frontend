<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Profile – RentWheels Admin</title>
  <link rel="stylesheet" href="../css/user-profile.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <main class="profile-page">
    <div class="container">

      <!-- Back link -->
      <a href="manage-users.html" class="back-link" id="backLink">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M13 16l-6-6 6-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Users
      </a>

      <!-- ── TOP: Basic Info Card ─────────────────── -->
      <div class="profile-card" id="profileCard">

        <div class="profile-card__left">
          <div class="avatar-wrap" id="avatarWrap">
            <!-- injected by JS -->
          </div>
          <div class="profile-card__info">
            <h1 class="profile-name" id="profileName">—</h1>
            <p class="profile-role">Registered User</p>
            <span class="status-badge" id="profileStatus">—</span>
          </div>
        </div>

        <div class="profile-card__right">
          <div class="info-grid">
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><path d="M2 4h12v9a1 1 0 01-1 1H3a1 1 0 01-1-1V4z" stroke="currentColor" stroke-width="1.3"/><path d="M2 4l6 5 6-5" stroke="currentColor" stroke-width="1.3"/></svg>
                Email
              </span>
              <span class="info-item__value" id="profileEmail">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><rect x="3" y="1" width="10" height="14" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M6 12h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Phone
              </span>
              <span class="info-item__value" id="profilePhone">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 2C5.24 2 3 4.24 3 7c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5z" stroke="currentColor" stroke-width="1.3"/><circle cx="8" cy="7" r="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
                Address
              </span>
              <span class="info-item__value" id="profileAddress">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M2 7h12M5 2v2M11 2v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Member Since
              </span>
              <span class="info-item__value" id="profileJoined">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 2a6 6 0 100 12A6 6 0 008 2z" stroke="currentColor" stroke-width="1.3"/><path d="M8 5v3l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                Date of Birth
              </span>
              <span class="info-item__value" id="profileDob">—</span>
            </div>
            <div class="info-item">
              <span class="info-item__label">
                <svg viewBox="0 0 16 16" fill="none"><path d="M8 2L3 4v4c0 3 2.5 5.5 5 6 2.5-.5 5-3 5-6V4L8 2z" stroke="currentColor" stroke-width="1.3"/></svg>
                License No.
              </span>
              <span class="info-item__value" id="profileLicense">—</span>
            </div>
          </div>
        </div>

      </div><!-- /profile-card -->

      <!-- ── MAIN GRID ──────────────────────────── -->
      <div class="main-grid">

        <!-- LEFT COLUMN -->
        <div class="col-left">

          <!-- Booking Summary -->
          <section class="section-card" id="bookingSummarySection">
            <div class="section-card__header">
              <h2 class="section-card__title">Booking Summary</h2>
            </div>
            <div class="stats-row" id="statsRow">
              <div class="stat-box">
                <span class="stat-box__number" id="statTotal">0</span>
                <span class="stat-box__label">Total Bookings</span>
              </div>
              <div class="stat-box stat-box--blue">
                <span class="stat-box__number" id="statActive">0</span>
                <span class="stat-box__label">Active</span>
              </div>
              <div class="stat-box stat-box--green">
                <span class="stat-box__number" id="statCompleted">0</span>
                <span class="stat-box__label">Completed</span>
              </div>
              <div class="stat-box stat-box--red">
                <span class="stat-box__number" id="statCancelled">0</span>
                <span class="stat-box__label">Cancelled</span>
              </div>
            </div>

            <!-- Recent Bookings list -->
            <div class="recent-bookings" id="recentBookings">
              <!-- injected -->
            </div>

          </section>

          <!-- Registered Vehicles -->
          <section class="section-card" id="vehiclesSection">
            <div class="section-card__header">
              <h2 class="section-card__title">Registered Vehicles</h2>
              <span class="section-count" id="vehiclesCount">0</span>
            </div>
            <div class="vehicles-list" id="vehiclesList">
              <!-- injected -->
            </div>
          </section>

        </div><!-- /col-left -->

        <!-- RIGHT COLUMN -->
        <div class="col-right">

          <!-- License Image -->
          <section class="section-card" id="licenseSection">
            <div class="section-card__header">
              <h2 class="section-card__title">Driver's License</h2>
              <span class="license-status-badge" id="licenseStatusBadge">Verified</span>
            </div>
            <div class="license-img-wrap" id="licenseImgWrap">
              <!-- injected -->
            </div>
            <div class="license-details" id="licenseDetails">
              <!-- injected -->
            </div>
          </section>

          <!-- Account Activity -->
          <section class="section-card">
            <div class="section-card__header">
              <h2 class="section-card__title">Account Activity</h2>
            </div>
            <div class="activity-list" id="activityList">
              <!-- injected -->
            </div>
          </section>

        </div><!-- /col-right -->

      </div><!-- /main-grid -->

    </div>
  </main>

  <!-- Toast -->
  <div class="toast hidden" id="toast" role="status"></div>

  <script src="../js/user-profile.js"></script>
</body>
</html>
