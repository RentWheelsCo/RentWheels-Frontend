<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users – RentWheels Admin</title>
  <link rel="stylesheet" href="../css/manage-users.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <main class="users-page">
    <div class="container">

      <div class="page-header">
        <div class="page-header__left">
          <h1 class="page-title">Manage Users</h1>
          <p class="page-subtitle">View and manage all registered users</p>
        </div>
        <div class="page-header__right">
          <span class="total-count" id="totalCount">0 users</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-wrap__icon" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="6.5" stroke="#9CA3AF" stroke-width="1.8"/>
            <path d="M14 14l3.5 3.5" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by name or email…"
            autocomplete="off"
          />
          <button class="search-clear hidden" id="searchClear" aria-label="Clear search">✕</button>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table class="users-table" id="usersTable">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Joined</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
          </tbody>
        </table>
      </div>

      <div class="empty-state hidden" id="emptyState">
        <div class="empty-state__icon">
          <svg viewBox="0 0 64 64" fill="none">
            <circle cx="32" cy="24" r="10" stroke="#CBD5E1" stroke-width="2.5"/>
            <path d="M12 52c0-11 9-18 20-18s20 7 20 18" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 class="empty-state__title" id="emptyTitle">No users found</h3>
        <p class="empty-state__text" id="emptyText">Try adjusting your search.</p>
      </div>

    </div>
  </main>

  <div class="modal-overlay hidden" id="viewModal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">User Details</h2>
        <button class="modal__close" id="viewModalClose">✕</button>
      </div>
      <div class="modal__body" id="viewModalBody">
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="editModal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title">Edit User</h2>
        <button class="modal__close" id="editModalClose">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="editName" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="editEmail" />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="text" class="form-input" id="editPhone" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input" id="editStatus">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
        <input type="hidden" id="editUserId" />
      </div>
      <div class="modal__footer">
        <button class="btn-ghost" id="editModalCancel">Cancel</button>
        <button class="btn-primary" id="editModalSave">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="deleteModal">
    <div class="modal modal--sm">
      <div class="modal__header">
        <h2 class="modal__title">Delete User</h2>
        <button class="modal__close" id="deleteModalClose">✕</button>
      </div>
      <div class="modal__body">
        <p class="delete-message">Are you sure you want to delete <strong id="deleteUserName"></strong>? This action cannot be undone.</p>
      </div>
      <div class="modal__footer">
        <button class="btn-ghost" id="deleteModalCancel">Cancel</button>
        <button class="btn-danger" id="deleteModalConfirm">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast" role="status"></div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/manage-users.js"></script>
</body>
</html>
